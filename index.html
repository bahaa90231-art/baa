<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ByteAcademy | كورس أساسيات الحاسوب - تجربة تعلم مستقبلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* خلفية متحركة ثلاثية الأبعاد */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 50%, #0f0c29, #302b63, #24243e);
        }

        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            animation: rotateBg 30s linear infinite;
        }

        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* جزيئات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(59,130,246,0.4);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* Glass Navbar فاخر */
        .glass-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(59,130,246,0.3);
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.6rem;
            font-weight: 900;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #7c3aed, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.7); }
            50% { box-shadow: 0 0 0 10px rgba(59,130,246,0); }
        }
        .logo-text {
            background: linear-gradient(135deg, #ffffff, #3b82f6, #7c3aed);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .stats-bar {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .progress-ring {
            width: 40px;
            height: 40px;
        }
        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
        }
        .theme-toggle:hover {
            background: rgba(59,130,246,0.3);
            border-color: #3b82f6;
        }

        /* Main layout */
        .platform {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            gap: 2rem;
        }

        /* Floating mobile menu */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 999;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(59,130,246,0.5);
            transition: all 0.3s;
        }
        .mobile-menu-btn:hover {
            transform: scale(1.1);
        }

        /* Premium Sidebar */
        .lessons-sidebar {
            flex: 1.2;
            min-width: 290px;
            background: rgba(15, 20, 35, 0.8);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 100px;
            border: 1px solid rgba(59,130,246,0.3);
            transition: all 0.3s;
        }
        .lessons-sidebar h3 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #3b82f6;
        }
        .lesson-btn {
            width: 100%;
            text-align: right;
            padding: 1rem 1rem;
            margin: 0.6rem 0;
            border: none;
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Cairo';
            color: #e2e8f0;
            border: 1px solid transparent;
        }
        .lesson-btn i { font-size: 1.2rem; color: #3b82f6; }
        .lesson-btn.active {
            background: linear-gradient(95deg, #3b82f6, #7c3aed);
            color: white;
            transform: translateX(-8px) scale(1.02);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 10px 25px -10px rgba(59,130,246,0.6);
        }
        .lesson-btn:hover:not(.active) {
            background: rgba(59,130,246,0.2);
            transform: translateX(-4px);
            border-color: rgba(59,130,246,0.5);
        }

        /* Main content - Premium Card */
        .content-card {
            flex: 3;
            background: rgba(15, 20, 35, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid rgba(59,130,246,0.3);
            transition: all 0.4s;
            animation: fadeSlideUp 0.5s ease-out;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .content-card:hover {
            border-color: rgba(59,130,246,0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .lesson-header {
            border-bottom: 2px solid rgba(59,130,246,0.4);
            padding-bottom: 1rem;
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .lesson-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(125deg, #ffffff, #3b82f6, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge-lesson {
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(59,130,246,0.3);
        }
        .lesson-content {
            font-size: 1.05rem;
            line-height: 1.8;
        }
        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .spec-card {
            background: rgba(255,255,255,0.05);
            padding: 1.2rem;
            border-radius: 20px;
            border: 1px solid rgba(59,130,246,0.2);
            transition: all 0.3s;
        }
        .spec-card:hover {
            transform: translateY(-5px);
            background: rgba(59,130,246,0.1);
            border-color: #3b82f6;
        }
        .highlight {
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(124,58,237,0.2));
            padding: 0.8rem 1.2rem;
            border-radius: 20px;
            font-weight: bold;
            margin: 1rem 0;
            border-right: 3px solid #3b82f6;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2.5rem;
            gap: 1rem;
        }
        .nav-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(59,130,246,0.3);
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo';
            color: white;
        }
        .nav-btn-primary {
            background: linear-gradient(95deg, #3b82f6, #7c3aed);
            border: none;
            box-shadow: 0 8px 20px rgba(59,130,246,0.4);
        }
        .nav-btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(59,130,246,0.6);
        }
        .nav-btn:hover:not(.nav-btn-primary) {
            background: rgba(59,130,246,0.2);
            border-color: #3b82f6;
        }

        /* Contact Section Premium */
        .contact-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(59,130,246,0.3);
        }
        .contact-card {
            background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(124,58,237,0.15));
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59,130,246,0.4);
            transition: all 0.4s;
        }
        .contact-card:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            box-shadow: 0 20px 40px rgba(59,130,246,0.2);
        }
        .contact-icon {
            font-size: 3rem;
            color: #25D366;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .contact-card h4 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .contact-number {
            font-size: 1.5rem;
            font-weight: 800;
            direction: ltr;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            margin: 1rem 0;
            letter-spacing: 2px;
            font-family: monospace;
        }
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #25D366;
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 800;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(37,211,102,0.3);
        }
        .whatsapp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 35px rgba(37,211,102,0.5);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            border-top: 1px solid rgba(59,130,246,0.2);
            margin-top: 1rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .platform { padding: 0 1rem; flex-direction: column; }
            .lessons-sidebar {
                position: fixed;
                top: 0;
                right: -320px;
                height: 100vh;
                width: 300px;
                z-index: 1050;
                transition: right 0.3s ease;
                border-radius: 0;
                padding-top: 80px;
                overflow-y: auto;
            }
            .lessons-sidebar.open { right: 0; }
            .overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.7);
                z-index: 1040;
                display: none;
            }
            .overlay.active { display: block; }
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .lesson-title { font-size: 1.5rem; }
        }

        @media (max-width: 480px) {
            .nav-container { padding: 0.8rem 1rem; }
            .logo-text { font-size: 1.2rem; }
            .stats-bar span:not(.progress-bar-mini) { font-size: 0.7rem; }
            .content-card { padding: 1.2rem; }
            .contact-number { font-size: 1rem; }
            .whatsapp-btn { padding: 0.7rem 1.5rem; }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="particles" id="particles"></div>

<div class="glass-nav">
    <div class="nav-container">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-microchip"></i></div>
            <span class="logo-text">Byte<span style="color:#7c3aed">Academy</span></span>

</div>

        <h3><i class="fas fa-crown" style="color:#facc15;"></i> الدروس المتقدمة</h3>

                <h4>تواصل مع فريق الدعم</h4>

                <div class="contact-number">
                    <i class="fab fa-whatsapp" style="margin-left: 8px;"></i>
                    +963 982 520 358
                </div>
                <a href="https://wa.me/963982520358" target="_blank" class="whatsapp-btn">
                    <i class="fab fa-whatsapp"></i> ابدأ المحادثة الآن
                </a>
                <div style="margin-top: 1rem; font-size: 0.7rem; opacity: 0.6;">
                    <i class="fas fa-clock"></i> رد فوري خلال ساعات العمل
                </div>
            </div>
        </div>
    </div>
</div>

<footer>

<script>
    // إنشاء جزيئات متحركة
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 8 + 5 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            container.appendChild(particle);
        }
    }
    createParticles();

    // المحتوى الأصلي
    const lessons = [
        { id: 1, title: "ما هو الحاسوب؟", badge: "المقدمة", content: `<p><strong>الحاسوب</strong> هو جهاز إلكتروني رقمي مصمم لاستقبال البيانات ومعالجتها وتخزينها وإخراجها بسرعة فائقة الدقة. إنه أداة متعددة الاستخدامات تعمل وفق مجموعة من التعليمات المبرمجة مسبقاً تُعرف بالبرامج، وتمكن المستخدم من تنفيذ مهام لا حصر لها بكفاءة عالية.</p><h3>🔄 معالجة البيانات</h3><ul><li><strong>استقبال البيانات:</strong> عبر وحدات الإدخال المختلفة</li><li><strong>معالجة البيانات:</strong> CPU تقوم بالعمليات الحسابية</li><li><strong>تخزين البيانات:</strong> RAM مؤقتاً أو أقراص صلبة</li><li><strong>إخراج النتائج:</strong> شاشة، طابعة، سماعات</li></ul><p>شهد الحاسوب تطوراً هائلاً من آلات ضخمة إلى هواتف ذكية في جيوبنا.</p>` },
        { id: 2, title: "المكونات المادية", badge: "Hardware", content: `<div class="spec-grid"><div class="spec-card"><strong>🖥️ اللوحة الأم</strong><br>العمود الفقري للحاسوب</div><div class="spec-card"><strong>💾 وحدات التخزين</strong><br>HDD/SSD حفظ دائم</div><div class="spec-card"><strong>🧠 RAM</strong><br>ذاكرة مؤقتة فائقة السرعة</div><div class="spec-card"><strong>⚙️ CPU</strong><br>عقل الحاسوب النابض</div></div><h3>⌨️ وحدات الإدخال والإخراج</h3><p>الإدخال: لوحة مفاتيح، فأرة، ماسح ضوئي، ميكروفون<br>الإخراج: شاشة، طابعة، سماعات، جهاز عرض</p>` },
        { id: 3, title: "تفصيل المكونات", badge: "CPU, RAM, GPU", content: `<h3>⚙️ وحدة المعالجة المركزية (CPU)</h3><p>تقاس بالجيجاهرتز (GHz) وعدد الأنوية. المعالجات الحديثة تحتوي على 16 نواة.</p><h3>🧠 الذاكرة العشوائية (RAM)</h3><p>8GB للاستخدام العادي، 16GB للمهام الاحترافية.</p><h3>🎮 بطاقة الرسوميات (GPU)</h3><p>متخصصة في معالجة البيانات المرئية، ضرورية للألعاب والتصميم.</p><div class='highlight'><strong>HDD vs SSD:</strong> SSD أسرع بكثير، صامت ومتين. HDD سعة أكبر بسعر أقل.</div>` },
        { id: 4, title: "المكونات البرمجية", badge: "Software", content: `<p>البرمجيات هي الروح التي تمنح الحاسوب حياته.</p><ul><li><strong>نظام التشغيل:</strong> Windows, macOS, Linux, Android, iOS</li><li><strong>برامج التطبيقات:</strong> Word, Excel, Chrome, Photoshop</li><li><strong>برامج المساعدة:</strong> مكافحة الفيروسات، WinRAR</li></ul><p>نظام التشغيل هو الوسيط بين المستخدم والمكونات المادية.</p>` },
        { id: 5, title: "أنواع الحواسيب", badge: "التنوع", content: `<div class="spec-grid"><div class="spec-card"><strong>🖥️ مكتبي</strong><br>أداء عالٍ قابل للترقية</div><div class="spec-card"><strong>💻 محمول</strong><br>مرونة وتنقل</div><div class="spec-card"><strong>📡 خادم</strong><br>يعمل 24/7</div><div class="spec-card"><strong>🚀 محطة عمل</strong><br>للهندسة والجرافيك</div><div class="spec-card"><strong>📱 أجهزة ذكية</strong><br>هواتف وأجهزة لوحية</div><div class="spec-card"><strong>⚡ حواسيب عملاقة</strong><br>لمحاكاة المناخ والفضاء</div></div>` },
        { id: 6, title: "مجالات الاستخدام", badge: "الحياة الرقمية", content: `<ul><li><strong>📚 التعليم:</strong> منصات إلكترونية، فصول افتراضية</li><li><strong>💼 الأعمال:</strong> إدارة قواعد البيانات، التجارة الإلكترونية</li><li><strong>🎮 الترفيه:</strong> ألعاب، أفلام، تصميم جرافيكي</li><li><strong>📡 الاتصالات:</strong> إنترنت، بريد إلكتروني</li><li><strong>🔬 الطب:</strong> تشخيص بالذكاء الاصطناعي، جراحة روبوتية</li></ul><div class='highlight'>الحاسوب أصبح ركيزة أساسية في الحياة العصرية.</div>` },
        { id: 7, title: "خطة التعلم", badge: "الختام", content: `<h3>📌 خلاصة الرحلة</h3><div class='spec-grid'><div class='spec-card'><strong>🎯 ابدأ بالأساسيات</strong></div><div class='spec-card'><strong>🛠️ طبق عملياً</strong></div><div class='spec-card'><strong>📈 واكب التطور</strong></div><div class='spec-card'><strong>🎓 توسّع في التخصص</strong></div></div><p style="text-align:center;">💡 "الحاسوب هو الآلة الأكثر مرونة التي ابتكرها الإنسان"</p>` }
    ];

    let currentLesson = 0;
    const STORAGE_KEY = 'byteacademy_lesson';
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved && saved >= 0 && saved < lessons.length) currentLesson = parseInt(saved);

    function renderSidebar() {
        const container = document.getElementById('lessonsList');
        container.innerHTML = '';
        lessons.forEach((lesson, idx) => {
            const btn = document.createElement('button');
            btn.classList.add('lesson-btn');
            if(idx === currentLesson) btn.classList.add('active');
            btn.innerHTML = `<i class="fas fa-gem"></i> ${lesson.title} <span style="margin-right:auto; font-size:0.65rem;">${lesson.badge}</span>`;
            btn.addEventListener('click', () => {
                currentLesson = idx;
                localStorage.setItem(STORAGE_KEY, currentLesson);
                renderSidebar();
                renderContent();
                updateStats();
                if(window.innerWidth <= 900) {
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('overlay').classList.remove('active');
                }
            });
            container.appendChild(btn);
        });
    }

    function renderContent() {
        const lesson = lessons[currentLesson];
        document.getElementById('dynamicTitle').innerHTML = lesson.title;
        document.getElementById('dynamicBadge').innerHTML = lesson.badge;
        const contentDiv = document.getElementById('dynamicContent');
        contentDiv.style.opacity = '0';
        setTimeout(() => {
            contentDiv.innerHTML = lesson.content;
            contentDiv.style.transition = 'opacity 0.3s';
            contentDiv.style.opacity = '1';
        }, 50);
        updateStats();
    }

    function updateStats() {
        const percent = ((currentLesson + 1) / lessons.length) * 100;
        document.getElementById('miniProgress').style.width = `${percent}%`;
        document.getElementById('completedCounter').innerText = currentLesson + 1;
        document.getElementById('totalLessons').innerText = lessons.length;
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
        if(currentLesson > 0) {
            currentLesson--;
            localStorage.setItem(STORAGE_KEY, currentLesson);
            renderSidebar();
            renderContent();
        }
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
        if(currentLesson < lessons.length - 1) {
            currentLesson++;
            localStorage.setItem(STORAGE_KEY, currentLesson);
            renderSidebar();
            renderContent();
        } else {
            alert("🎉 تهانينا! أكملت جميع الدروس بنجاح.");
        }
    });

    window.addEventListener('keydown', (e) => {
        if(e.key === 'ArrowLeft') document.getElementById('nextBtn').click();
        if(e.key === 'ArrowRight') document.getElementById('prevBtn').click();
    });

    // Mobile menu
    const mobileBtn = document.getElementById('mobileMenuToggle');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    mobileBtn.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    });
    overlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    });

    renderSidebar();
    renderContent();
    updateStats();
</script>
</body>
</html>
